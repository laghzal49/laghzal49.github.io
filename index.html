<script>
    // --- 1. TERMINAL TYPING ENGINE ---
    document.addEventListener('DOMContentLoaded', () => {
      runTerminalSequence();
      loadGitHubData();
    });

    async function typeText(elementId, text, speed = 50) {
      const el = document.getElementById(elementId);
      for (let char of text) {
        el.innerHTML += char;
        await new Promise(r => setTimeout(r, speed));
      }
    }

    async function runTerminalSequence() {
      await typeText('cmd1', 'whoami', 100);
      await new Promise(r => setTimeout(r, 400));
      document.getElementById('name-output').classList.add('fade-in');
      await new Promise(r => setTimeout(r, 600));

      document.getElementById('prompt2').classList.add('fade-in');
      await typeText('cmd2', 'cat info.txt', 100);
      await new Promise(r => setTimeout(r, 400));
      await typeText('info-output', 'Student at 1337 | C & Python Developer | Custom Environment Enthusiast', 30);
      
      await new Promise(r => setTimeout(r, 500));
      document.getElementById('socials').classList.add('fade-in');
    }

    // --- 2. LIGHTWEIGHT GITHUB API (NO RATE LIMIT ISSUES) ---
    async function loadGitHubData() {
      const container = document.getElementById("repos");
      const statusObj = document.getElementById("loading-status");
      
      // Force clear any broken cache from earlier testing
      localStorage.removeItem('tarik_gh_data');

      try {
        // This uses ONLY 1 request, so you won't get rate-limited easily!
        const res = await fetch("https://api.github.com/users/laghzal49/repos?per_page=100");
        if (!res.ok) throw new Error("API Error");

        const repos = await res.json();
        
        // Filter out forks and sort by latest update
        const cleanRepos = repos
          .filter(r => !r.fork)
          .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

        statusObj.style.display = 'none';
        
        let processed = cleanRepos.map(repo => {
          let icon = 'fas fa-code';
          if (repo.language === 'C') icon = 'fas fa-c';
          if (repo.language === 'Python') icon = 'fab fa-python';
          if (repo.language === 'Shell') icon = 'fas fa-terminal';

          return {
            name: repo.name, 
            lang: repo.language, 
            icon: icon, 
            desc: repo.description || "System code. No description provided.",
            stars: repo.stargazers_count, 
            url: repo.html_url,
            date: new Date(repo.updated_at).toLocaleDateString()
          };
        });

        renderCards(processed, container);

      } catch (err) {
        statusObj.innerHTML = "<i class='fas fa-exclamation-triangle'></i> Connection to GitHub failed. The API might still be blocking your IP for a few more minutes.";
        statusObj.style.color = "#ff5f56";
      }
    }

    function renderCards(data, container) {
      container.innerHTML = '';
      data.forEach(r => {
        const langStr = r.lang ? `<p class="tech-stack"><i class="${r.icon}"></i> ${r.lang}</p>` : '';
        container.innerHTML += `
          <div class="card">
            <h3>${r.name}</h3>
            ${langStr}
            <p>${r.desc}</p>
            <div style="font-size: 0.85rem; margin-bottom: 15px; display: flex; gap: 15px; opacity: 0.7;">
              <span><i class="fas fa-star"></i> ${r.stars}</span>
              <span><i class="fas fa-clock"></i> ${r.date}</span>
            </div>
            <a href="${r.url}" target="_blank" style="margin-top: auto;"><i class="fab fa-github"></i> Inspect Source</a>
          </div>`;
      });
    }
  </script>
